<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Petrol Calculator</title>

  
  <link rel="stylesheet" href="calcu.css">
</head>
<body>

  
  <main class="container">

    <h1>Petrol Calculator</h1>

    <section class="calculator">

      
      <label for="cost">Cost per Litre</label>
      <input type="number" id="cost" value="1.72" step="0.01">

      
      <label for="litres">Litres Purchased</label>
      <input type="number" id="litres" value="0" step="0.1">

      
      <label for="currency">Currency</label>
      <select id="currency">
        <option value="£">£ GBP</option>
        <option value="$">$ USD</option>
        <option value="₱">₱ PHP</option>
      </select>

      
      <button id="calculateBtn">Calculate</button>

      
      <p id="result">Total Cost: £0.00</p>

    </section>

  </main>

  
  <script src="script.js"></script>

</body>
</html>
